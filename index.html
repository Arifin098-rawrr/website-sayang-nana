<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selamat datang calon Sayang hahah</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Canvas partikel di opening */
        #opening-canvas {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 101;
        }
    </style>
</head>
<body>

    <!-- LOADING SCREEN -->
    <div id="loading-screen">
        <div class="loader-content">
            <div class="spinner-3d"></div>
            <p>Memuat Perasaan... 🌹</p>
        </div>
    </div>

    <!-- CANVAS PARTIKEL OPENING -->
    <canvas id="opening-canvas"></canvas>

    <!-- AUDIO -->
    <audio id="bg-music" src="assets/music/music.mp3" loop></audio>

    <!-- TOMBOL MUSIK -->
    <button id="music-toggle" class="music-btn hidden">
        <i class="fas fa-compact-disc fa-spin"></i>
    </button>

    <!-- OPENING SCREEN -->
    <section id="opening-screen" style="background-image: linear-gradient(rgba(60,0,20,0.6), rgba(10,0,8,0.75)), url('assets/images/cover.jpg');">
        <div class="glass-card" data-aos="zoom-in" data-aos-duration="1200">
            <h1 class="title-premium">hallo nana </h1>
            <p class="quote-premium">"Setiap foto menyimpan cerita yang tak terlupakan."</p>
            <button id="btn-buka" class="btn-premium">
                <i class="fas fa-heart"></i> klik ini My boss
            </button>
        </div>
    </section>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script src="js/loading.js"></script>
    <!-- ✅ music.js ditambahkan di sini -->
    <script src="js/music.js"></script>
    <script src="js/animation.js"></script>
    <!-- Partikel love juga di opening screen -->
    <script>
    (() => {
        const canvas = document.getElementById('opening-canvas');
        const ctx    = canvas.getContext('2d');
        let W = canvas.width  = window.innerWidth;
        let H = canvas.height = window.innerHeight;
        window.addEventListener('resize', () => {
            W = canvas.width  = window.innerWidth;
            H = canvas.height = window.innerHeight;
        });

        const HEART_COLORS = ['#ff6b9d','#f5576c','#c44569','#fbc2eb','#ff8fab'];
        const PETAL_COLORS = ['#ffd1dc','#ffb3c6','#ff8fab','#ff6b9d','#ffcad4'];

        function drawHeart(ctx, x, y, s, color, alpha) {
            ctx.save();
            ctx.globalAlpha = alpha;
            ctx.fillStyle   = color;
            ctx.beginPath();
            ctx.moveTo(x, y + s * 0.3);
            ctx.bezierCurveTo(x, y, x - s*0.5, y, x - s*0.5, y + s*0.3);
            ctx.bezierCurveTo(x - s*0.5, y + s*0.65, x, y + s*0.9, x, y + s);
            ctx.bezierCurveTo(x, y + s*0.9, x + s*0.5, y + s*0.65, x + s*0.5, y + s*0.3);
            ctx.bezierCurveTo(x + s*0.5, y, x, y, x, y + s*0.3);
            ctx.fill();
            ctx.restore();
        }

        class Heart {
            constructor() { this.reset(true); }
            reset(init=false) {
                this.x = Math.random()*W; this.y = init ? Math.random()*H : H+20;
                this.s = 7+Math.random()*16; this.vy = 0.3+Math.random()*0.7;
                this.vx = (Math.random()-0.5)*0.5; this.wb = Math.random()*Math.PI*2;
                this.wbs = 0.02+Math.random()*0.02; this.alpha = 0.1+Math.random()*0.4;
                this.color = HEART_COLORS[Math.floor(Math.random()*HEART_COLORS.length)];
            }
            update() {
                this.wb += this.wbs; this.y -= this.vy;
                this.x += this.vx + Math.sin(this.wb)*0.4;
                if (this.y < -this.s*2) this.reset();
            }
            draw() { drawHeart(ctx, this.x-this.s*0.5, this.y-this.s*0.5, this.s, this.color, this.alpha); }
        }

        class Petal {
            constructor() { this.reset(true); }
            reset(init=false) {
                this.x = Math.random()*W; this.y = init ? Math.random()*H : -15;
                this.w = 5+Math.random()*9; this.h = 2+Math.random()*5;
                this.angle = Math.random()*Math.PI*2; this.spin = (Math.random()-0.5)*0.05;
                this.vy = 0.5+Math.random()*1.1; this.drift = (Math.random()-0.5)*0.7;
                this.wb = Math.random()*Math.PI*2; this.wbs = 0.02+Math.random()*0.03;
                this.alpha = 0.15+Math.random()*0.5;
                this.color = PETAL_COLORS[Math.floor(Math.random()*PETAL_COLORS.length)];
            }
            update() {
                this.wb += this.wbs; this.y += this.vy;
                this.x += this.drift + Math.sin(this.wb)*0.7; this.angle += this.spin;
                if (this.y > H+15) this.reset();
            }
            draw() {
                ctx.save(); ctx.globalAlpha = this.alpha; ctx.fillStyle = this.color;
                ctx.translate(this.x, this.y); ctx.rotate(this.angle);
                ctx.beginPath(); ctx.ellipse(0,0,this.w,this.h,0,0,Math.PI*2); ctx.fill();
                ctx.restore();
            }
        }

        const hearts = Array.from({length:25}, ()=>new Heart());
        const petals = Array.from({length:40}, ()=>new Petal());

        function loop() {
            ctx.clearRect(0,0,W,H);
            petals.forEach(p=>{p.update();p.draw();});
            hearts.forEach(h=>{h.update();h.draw();});
            requestAnimationFrame(loop);
        }
        loop();
    })();
    </script>
</body>
</html>
